<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои C# Приложения</title>
    <style>
        /* === ОСНОВНЫЕ СТИЛИ === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: #2c3e50;
            line-height: 1.6;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* === ШАПКА === */
        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }

        .header h1 {
            color: #ffffff;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .header p {
            color: #f0f0f0;
            font-size: 1.1rem;
            margin-bottom: 20px;
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .stat-item {
            text-align: center;
            background: rgba(255, 255, 255, 0.2);
            padding: 15px 25px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .stat-number {
            color: #ffffff;
            font-size: 1.8rem;
            font-weight: bold;
        }

        .stat-label {
            color: #f0f0f0;
            font-size: 0.9rem;
        }

        /* === ПАНЕЛЬ ПОИСКА И ФИЛЬТРОВ === */
        .controls {
            background: #ffffff;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        .info-banner {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            box-shadow: 0 3px 10px rgba(102, 126, 234, 0.3);
        }

        .info-banner .icon {
            font-size: 1.2rem;
        }

        .search-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .search-input {
            flex: 1;
            min-width: 250px;
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            color: #2c3e50;
            padding: 12px 15px;
            border-radius: 10px;
            font-family: 'Courier New', monospace;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .search-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .filter-tags {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .tag-filter {
            background: #f8f9fa;
            color: #495057;
            padding: 8px 15px;
            border-radius: 20px;
            border: 2px solid #e0e0e0;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .tag-filter:hover {
            border-color: #667eea;
            color: #667eea;
            background: #f0f4ff;
        }

        .tag-filter.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
        }

        /* === КАРТОЧКИ ПРИЛОЖЕНИЙ === */
        .apps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .app-card {
            background: #ffffff;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
        }

        .app-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 35px rgba(102, 126, 234, 0.3);
        }

        .app-image {
            height: 240px;
            overflow: hidden;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        .app-image img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .app-image .no-image-text {
            color: #ffffff;
            font-size: 0.95rem;
            text-align: center;
            padding: 20px;
        }

        .app-badges {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 5px;
            flex-direction: column;
            align-items: flex-end;
        }

        .app-badge {
            background: rgba(255, 255, 255, 0.9);
            color: #764ba2;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: bold;
        }

        .version-badge {
            background: rgba(255, 255, 255, 0.9);
            color: #667eea;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: bold;
        }

        .new-badge {
            background: #ff6b6b;
            color: white;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: bold;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .app-content {
            padding: 20px;
        }

        .app-title {
            color: #2c3e50;
            font-size: 1.3rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .app-rating {
            display: flex;
            gap: 2px;
            margin-bottom: 10px;
        }

        .star {
            color: #ffd700;
            font-size: 1rem;
        }

        .star.empty {
            color: #ddd;
        }

        .app-meta {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
            color: #6c757d;
            font-size: 0.85rem;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .app-description {
            margin-bottom: 15px;
            line-height: 1.5;
            color: #495057;
        }

        .app-tags {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .app-tag {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
        }

        .app-details {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 0.85rem;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px solid #e9ecef;
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            color: #6c757d;
        }

        .detail-value {
            color: #2c3e50;
            font-weight: bold;
        }

        .app-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .download-btn {
            flex: 1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s;
            cursor: pointer;
            border: none;
            font-family: 'Courier New', monospace;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        /* === ФУТЕР === */
        .footer {
            text-align: center;
            margin-top: 50px;
            padding: 20px;
            color: #6c757d;
        }

        /* === СООБЩЕНИЯ === */
        .no-results {
            text-align: center;
            padding: 50px;
            color: #6c757d;
        }

        .no-results h3 {
            color: #495057;
            margin-bottom: 10px;
        }

        /* === АДАПТИВНОСТЬ === */
        @media (max-width: 768px) {
            .apps-grid {
                grid-template-columns: 1fr;
            }

            .stats-bar {
                gap: 15px;
            }

            .search-bar {
                flex-direction: column;
            }

            .app-meta {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ШАПКА -->
        <header class="header">
            <h1>🎮 Мои C# Проекты</h1>
            <p>Коллекция игр и приложений на C#</p>
            
            <div class="stats-bar">
                <div class="stat-item">
                    <div class="stat-number" id="totalApps">0</div>
                    <div class="stat-label">Проектов</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="totalHours">0</div>
                    <div class="stat-label">Часов разработки</div>
                </div>
            </div>
        </header>

        <!-- ПАНЕЛЬ УПРАВЛЕНИЯ -->
        <div class="controls">
            <div class="info-banner">
                <span class="icon">✨</span>
                <span>Все проекты доступны для скачивания бесплатно</span>
            </div>
            <div class="search-bar">
                <input 
                    type="text" 
                    class="search-input" 
                    id="searchInput" 
                    placeholder="🔍 Поиск по названию или описанию..."
                >
            </div>
            <div class="filter-tags" id="filterTags">
                <!-- Теги будут загружены динамически -->
            </div>
        </div>

        <!-- КОНТЕЙНЕР ДЛЯ ПРИЛОЖЕНИЙ -->
        <main>
            <div class="apps-grid" id="appsContainer">
                <!-- ПРИЛОЖЕНИЯ БУДУТ ЗАГРУЖЕНЫ ЗДЕСЬ -->
            </div>
            
            <!-- Сообщение если нет результатов -->
            <div id="noResults" class="no-results" style="display: none;">
                <h3>😕 Ничего не найдено</h3>
                <p>Попробуйте изменить параметры поиска</p>
            </div>
        </main>

        <!-- ФУТЕР -->
        <footer class="footer">
            <p>© 2026 | C# Portfolio | Мои проекты на C#</p>
            <p style="font-size: 0.9rem; margin-top: 10px;">
                Все приложения созданы мной. Наслаждайтесь просмотром!
            </p>
        </footer>
    </div>

    <script>
        // ============================
        // БАЗА ДАННЫХ ПРИЛОЖЕНИЙ
        // ============================
        let csharpApps = [
            {
                id: 1,
                name: "Dog Clicker Simulator",
                version: "BETA 1.7",
                image: "https://raw.githubusercontent.com/DevDeveloper2/Game-Collection/refs/heads/main/Preview.png", 
                description: "Кликайте на собаку и получайте очки! Простая и увлекательная игра-кликер.",
                developmentTime: "4 часа",
                fileSize: 6.72,
                fileSizeUnit: "MB",
                projectUrl: "https://www.dropbox.com/scl/fi/mtkmw7mzuie4esne75wbn/DogClickerSim.zip?rlkey=ikby44gn0s4bse1sne7atqu97&st=9u787avy&dl=1",
                added: "2026-02-07",
                updated: "2026-03-14",
                rating: 4,
                tags: ["Игра", "Кликер", "Казуальная"],
                requirements: "Windows 10+, .NET 10.0",
                language: "C#"
            }
            // ДОБАВЛЯЙТЕ НОВЫЕ ПРИЛОЖЕНИЯ ЗДЕСЬ
        ];

        // ============================
        // ОСНОВНАЯ ЛОГИКА
        // ============================
        document.addEventListener('DOMContentLoaded', function() {
            const appsContainer = document.getElementById('appsContainer');
            const noResults = document.getElementById('noResults');
            const searchInput = document.getElementById('searchInput');
            const filterTagsContainer = document.getElementById('filterTags');
            
            let activeFilters = new Set();
            let searchQuery = '';

            // ============================
            // ФУНКЦИЯ: ПОЛУЧЕНИЕ ВСЕХ ТЕГОВ
            // ============================
            function getAllTags() {
                const tagsSet = new Set();
                csharpApps.forEach(app => {
                    app.tags.forEach(tag => tagsSet.add(tag));
                });
                return Array.from(tagsSet);
            }

            // ============================
            // ФУНКЦИЯ: ОТОБРАЖЕНИЕ ФИЛЬТРОВ
            // ============================
            function renderFilters() {
                const tags = getAllTags();
                filterTagsContainer.innerHTML = `
                    <div class="tag-filter ${activeFilters.size === 0 ? 'active' : ''}" data-tag="all">
                        Все
                    </div>
                `;
                
                tags.forEach(tag => {
                    const filterBtn = document.createElement('div');
                    filterBtn.className = 'tag-filter';
                    filterBtn.dataset.tag = tag;
                    filterBtn.textContent = tag;
                    if (activeFilters.has(tag)) {
                        filterBtn.classList.add('active');
                    }
                    filterTagsContainer.appendChild(filterBtn);
                });

                // Обработчики кликов
                document.querySelectorAll('.tag-filter').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const tag = this.dataset.tag;
                        
                        if (tag === 'all') {
                            activeFilters.clear();
                        } else {
                            if (activeFilters.has(tag)) {
                                activeFilters.delete(tag);
                            } else {
                                activeFilters.add(tag);
                            }
                        }
                        
                        renderFilters();
                        renderApps();
                    });
                });
            }

            // ============================
            // ФУНКЦИЯ: ФИЛЬТРАЦИЯ ПРИЛОЖЕНИЙ
            // ============================
            function filterApps() {
                return csharpApps.filter(app => {
                    // Фильтр по поиску
                    const matchesSearch = searchQuery === '' || 
                        app.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
                        app.description.toLowerCase().includes(searchQuery.toLowerCase());
                    
                    // Фильтр по тегам
                    const matchesTags = activeFilters.size === 0 || 
                        app.tags.some(tag => activeFilters.has(tag));
                    
                    return matchesSearch && matchesTags;
                });
            }

            // ============================
            // ФУНКЦИЯ: ПРОВЕРКА НА НОВИЗНУ
            // ============================
            function isNew(dateString) {
                const addedDate = new Date(dateString);
                const now = new Date();
                const daysDiff = (now - addedDate) / (1000 * 60 * 60 * 24);
                return daysDiff <= 7;
            }

            // ============================
            // ФУНКЦИЯ: ФОРМАТИРОВАНИЕ РАЗМЕРА
            // ============================
            function formatSize(size, unit) {
                if (size >= 1024 && unit === "MB") {
                    return (size / 1024).toFixed(2) + " GB";
                }
                return size + " " + unit;
            }

            // ============================
            // ФУНКЦИЯ: ОТОБРАЖЕНИЕ ЗВЕЗД
            // ============================
            function renderStars(rating) {
                let stars = '';
                for (let i = 1; i <= 5; i++) {
                    stars += `<span class="star ${i <= rating ? '' : 'empty'}">★</span>`;
                }
                return stars;
            }

            // ============================
            // ФУНКЦИЯ: ОТОБРАЗИТЬ ПРИЛОЖЕНИЯ
            // ============================
            function renderApps() {
                appsContainer.innerHTML = '';
                const filteredApps = filterApps();
                
                if (filteredApps.length === 0) {
                    noResults.style.display = 'block';
                    return;
                }
                
                noResults.style.display = 'none';
                
                // Сортируем по дате (новые сверху)
                const sortedApps = [...filteredApps].sort((a, b) => 
                    new Date(b.added) - new Date(a.added)
                );
                
                // Создаем карточки
                sortedApps.forEach(app => {
                    const appCard = document.createElement('div');
                    appCard.className = 'app-card';
                    
                    const showNewBadge = isNew(app.added);
                    
                    const imageContent = app.image 
                        ? `<img src="${app.image}" alt="${app.name}">`
                        : `<div class="no-image-text">📷 Фото у данной игры нету</div>`;
                    
                    appCard.innerHTML = `
                        <div class="app-image">
                            ${imageContent}
                            <div class="app-badges">
                                ${showNewBadge ? '<div class="new-badge">НОВОЕ</div>' : ''}
                                <div class="version-badge">v${app.version}</div>
                                <div class="app-badge">C#</div>
                            </div>
                        </div>
                        <div class="app-content">
                            <h3 class="app-title">
                                ${app.name}
                            </h3>
                            <div class="app-rating">${renderStars(app.rating)}</div>
                            
                            <div class="app-meta">
                                <div class="meta-item">⏱️ ${app.developmentTime}</div>
                                <div class="meta-item">📦 ${formatSize(app.fileSize, app.fileSizeUnit)}</div>
                                <div class="meta-item">📅 ${app.added}</div>
                                <div class="meta-item">🔄 ${app.updated}</div>
                            </div>
                            
                            <p class="app-description">${app.description}</p>
                            
                            <div class="app-tags">
                                ${app.tags.map(tag => `<span class="app-tag">${tag}</span>`).join('')}
                            </div>
                            
                            <div class="app-details">
                                <div class="detail-row">
                                    <span class="detail-label">Версия:</span>
                                    <span class="detail-value">${app.version}</span>
                                </div>
                                <div class="detail-row">
                                    <span class="detail-label">Язык:</span>
                                    <span class="detail-value">${app.language}</span>
                                </div>
                                <div class="detail-row">
                                    <span class="detail-label">Требования:</span>
                                    <span class="detail-value">${app.requirements}</span>
                                </div>
                                <div class="detail-row">
                                    <span class="detail-label">Обновлено:</span>
                                    <span class="detail-value">${app.updated}</span>
                                </div>
                            </div>
                            
                            <div class="app-actions">
                                <a href="${app.projectUrl}" 
                                   class="download-btn" 
                                   target="_blank">
                                    📥 Скачать
                                </a>
                            </div>
                        </div>
                    `;
                    appsContainer.appendChild(appCard);
                });
            }

            // ============================
            // ФУНКЦИЯ: ОБНОВЛЕНИЕ СТАТИСТИКИ
            // ============================
            function updateStats() {
                document.getElementById('totalApps').textContent = csharpApps.length;
                
                const totalHours = csharpApps.reduce((sum, app) => {
                    const hours = parseInt(app.developmentTime);
                    return sum + (isNaN(hours) ? 0 : hours);
                }, 0);
                document.getElementById('totalHours').textContent = totalHours;
            }

            // ============================
            // ОБРАБОТЧИКИ СОБЫТИЙ
            // ============================
            searchInput.addEventListener('input', function() {
                searchQuery = this.value;
                renderApps();
            });

            // ============================
            // ИНИЦИАЛИЗАЦИЯ
            // ============================
            function initialize() {
                appsContainer.innerHTML = '<div style="text-align: center; padding: 50px; color: #6c757d;">⏳ Загрузка...</div>';
                
                renderFilters();
                renderApps();
                updateStats();
            }
            
            // Запускаем инициализацию
            initialize();
        });
    </script>
</body>
</html>
